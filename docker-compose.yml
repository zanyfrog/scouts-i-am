services:
  scouts-auth:
    build:
      context: ..
      dockerfile: ./scouts-i-am/Dockerfile
    image: scouts-authentication-and-authorization:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATA_FILE: /data/store.json
    volumes:
      - scouts-auth-data:/data
    restart: unless-stopped

volumes:
  scouts-auth-data:
